<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Digital Bookshelf Portal | Paramount School</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    html, body { overflow-x: hidden; background-color: #030712; color: white; min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; position: relative; scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none !important; }
    
    .background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 40%, rgba(2, 35, 90, 0.5), transparent 70%), radial-gradient(circle at 85% 20%, rgba(109, 40, 217, 0.15), transparent 50%), linear-gradient(180deg, #030712 0%, #070e1e 100%); z-index: -3; }
    
    /* Premium Unified Architecture Header */
    .premium-header { width: 100%; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.01); border-bottom: 1px solid rgba(255, 255, 255, 0.06); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 50; position: relative; }
    .header-left-brand { display: flex; align-items: center; gap: 20px; }
    .header-logo { width: 55px; height: 55px; object-fit: contain; border-radius: 50%; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.4)); border: 1px solid rgba(255, 255, 255, 0.1); }
    .header-text-container { display: flex; flex-direction: column; }
    .header-title { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.5px; color: #ffffff; text-transform: uppercase; }
    .header-subtitle { font-size: 0.85rem; font-weight: 500; color: #60a5fa; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* Interactive Live Profile Icon Anchor Engine Controls */
    .user-profile-anchor { position: relative; display: flex; align-items: center; cursor: pointer; }
    .profile-avatar-frame { width: 46px; height: 46px; border-radius: 50%; border: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.1); display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); transition: all 0.3s ease; }
    .profile-avatar-frame:hover { transform: scale(1.05); border-color: #60a5fa; box-shadow: 0 0 20px rgba(96, 165, 250, 0.5); }
    .profile-img-element { width: 100%; height: 100%; object-fit: cover; }
    .default-avatar-placeholder { font-size: 1.2rem; font-weight: 700; color: white; }

    /* Custom Glassmorphic Profile Dropsheet Menu Overlay */
    .profile-dropdown-card { position: absolute; top: 60px; right: 0; width: 280px; background: #0b1329; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 18px; padding: 22px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); display: none; flex-direction: column; gap: 15px; z-index: 100; transform-origin: top right; animation: smoothDrop 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes smoothDrop { from { opacity: 0; transform: scale(0.92) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .profile-dropdown-card.active { display: flex; }
    .dropdown-user-name { font-size: 0.95rem; font-weight: 600; color: white; text-align: left; }
    .dropdown-user-email { font-size: 0.8rem; color: #94a3b8; text-align: left; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .dropdown-divider { border-bottom: 1px solid rgba(255, 255, 255, 0.06); width: 100%; margin: 5px 0; }
    .dropdown-plan-badge-container { display: flex; justify-content: space-between; align-items: center; background: rgba(59, 130, 246, 0.06); border: 1px solid rgba(59, 130, 246, 0.15); padding: 10px 14px; border-radius: 10px; }
    .badge-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; font-weight: 500; }
    .badge-tier-value { font-size: 0.8rem; color: #60a5fa; font-weight: 700; text-transform: uppercase; }

    .logout-btn { width: 100%; padding: 11px; border-radius: 10px; background: rgba(239, 68, 68, 0.06); border: 1px solid rgba(239, 68, 68, 0.15); color: #fca5a5; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; text-align: center; }
    .logout-btn:hover { background: rgba(239, 68, 68, 0.15); border-color: #ef4444; color: white; }

    /* Layout Main Framework Dashboard Components */
    .dashboard-layout { max-width: 1200px; margin: 0 auto; padding: 40px 20px; width: 100%; flex-grow: 1; }
    .glass-card { background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px; padding: 35px 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
    
    .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 40px; }
    .select-group { display: flex; flex-direction: column; gap: 8px; text-align: left; }
    .select-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: #cbd5e1; font-weight: 600; }
    .select-group select { padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: white; font-size: 0.95rem; outline: none; cursor: pointer; transition: all 0.3s ease; }
    .select-group select:focus { border-color: #3b82f6; background: rgba(255,255,255,0.06); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
    .select-group select option { background-color: #0b1329; color: white; padding: 10px; }

    /* Shelf Engine UI Grid Cards Render Elements */
    .books-container-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
    .book-card { padding: 25px; text-align: center; border-radius: 20px; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.03); cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; height: 310px; position: relative; }
    .book-card:hover { transform: translateY(-6px); background: rgba(255,255,255,0.04); border-color: rgba(59, 130, 246, 0.35); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
    
    .book-cover-placeholder { width: 95px; height: 130px; background: linear-gradient(135deg, #1e40af, #6366f1); border-radius: 10px; margin: 0 auto 18px auto; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; box-shadow: 0 12px 24px rgba(0,0,0,0.4); transition: transform 0.3s; }
    .book-card:hover .book-cover-placeholder { transform: scale(1.05) rotate(-2deg); }
    
    .book-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; color: #ffffff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 44px; line-height: 1.4; }
    .book-card:hover .book-title { color: #60a5fa; }
    .book-info-tag { font-size: 0.82rem; color: #94a3b8; margin-top: auto; }
    .no-books-alert { text-align: center; color: #94a3b8; padding: 50px; grid-column: 1 / -1; font-size: 1.1rem; font-weight: 500; letter-spacing: 0.5px; }

    /* Modal Core Reader Overlays */
    .viewer-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.95); backdrop-filter: blur(15px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
    .viewer-modal-box { width: 100%; max-width: 1000px; height: 88vh; background: #0b1224; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.7); position: relative; transition: max-width 0.2s, height 0.2s; outline: none !important; }
    
    /* Native Hardware Desktops Fullscreen Viewport Mode Configurations */
    .viewer-modal-box:fullscreen { max-width: 100vw !important; height: 100vh !important; border-radius: 0px !important; border: none !important; outline: none !important; box-shadow: none !important; background: #0b1224 !important; }
    .viewer-modal-box:-webkit-full-screen { max-width: 100vw !important; height: 100vh !important; border-radius: 0px !important; border: none !important; outline: none !important; }

    /* 📱 INTEGRATED SMART MOBILE VIEWER ENGINE: Scales frame seamlessly inside device browsers */
    .viewer-modal-box[data-mobile-fullscreen="true"] {
      max-width: 100vw !important;
      width: 100vw !important;
      height: 100vh !important;
      max-height: 100vh !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      border-radius: 0px !important;
      border: none !important;
      z-index: 999999 !important;
    }

    .viewer-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 18px 25px; background: rgba(255, 255, 255, 0.02); border-bottom: 1px solid rgba(255, 255, 255, 0.06); gap: 15px; }
    .viewer-action-controls { display: flex; align-items: center; gap: 20px; }
    .fullscreen-toggle-btn { background: transparent; border: 1px solid rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 8px; color: #cbd5e1; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s; outline: none !important; }
    .fullscreen-toggle-btn:hover { background: rgba(255,255,255,0.05); color: #60a5fa; border-color: #3b82f6; }
    
    .viewer-close { font-size: 1.8rem; color: #94a3b8; cursor: pointer; background: none; border: none; transition: color 0.2s; line-height: 1; outline: none !important; }
    .viewer-close:hover { color: #ef4444; }
    
    .viewer-iframe { position: absolute; top: -50px; left: 0; height: calc(100% + 50px); width: 100%; border: none !important; outline: none !important; background: #111827; }

    /* 🌟 PURE TRANSPARENT WATERMARK LOGO ELEMENT Sit Node (Top-Left Position) */
    .fullscreen-branding-logo-node { 
      position: absolute; 
      top: 25px; 
      left: 25px; 
      display: none; 
      align-items: center; 
      z-index: 300000; 
      pointer-events: none; 
      background: transparent !important; 
      border: none !important;
      box-shadow: none !important;
      outline: none !important;
    }

    /* 🌟 PREMIUM FLOATING ACTION EXIT BUTTON Node Layout (Top-Right Position) */
    .fullscreen-floating-exit-node {
      position: absolute;
      top: 25px;
      right: 25px;
      display: none;
      align-items: center;
      z-index: 300000;
      background: rgba(239, 68, 68, 0.85) !important; /* Made opaque on mobile to stay easily clickable */
      border: 1px solid rgba(239, 68, 68, 0.4) !important;
      padding: 10px 20px;
      border-radius: 12px;
      color: #ffffff;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
      outline: none !important;
    }
    .fullscreen-floating-exit-node:hover { background: #ef4444 !important; transform: translateY(-1px); }

    /* Activate overlay component views cleanly across desktop fullscreen or custom mobile states */
    .viewer-modal-box:fullscreen .fullscreen-branding-logo-node,
    .viewer-modal-box[data-mobile-fullscreen="true"] .fullscreen-branding-logo-node { display: flex; }
    
    .viewer-modal-box:fullscreen .fullscreen-floating-exit-node,
    .viewer-modal-box[data-mobile-fullscreen="true"] .fullscreen-floating-exit-node { display: flex; }

    .fullscreen-brand-img { width: 90px; height: 90px; object-fit: contain; background: transparent !important; opacity: 0.45; border: none !important; outline: none !important; }
    
    /* Footer Component Blocks */
    .site-footer { width: 100%; padding: 30px 20px; text-align: center; background: rgba(255, 255, 255, 0.01); border-top: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 50px; }
    .footer-headline { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; }
    .social-media-container { display: flex; align-items: center; justify-content: center; gap: 22px; }
    .social-icon-link { width: 44px; height: 44px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; color: #cbd5e1; text-decoration: none; }
    .social-icon-link:hover { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; color: #60a5fa; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.2); }
    .social-icon-svg { width: 20px; height: 20px; fill: currentColor; }
    .copyright-notice { font-size: 0.8rem; color: #4b5563; margin-top: 5px; letter-spacing: 0.5px; }

    @media (max-width: 768px) {
      .controls-grid { grid-template-columns: 1fr; gap: 15px; padding: 20px 15px; }
      .premium-header { padding: 15px 20px; }
      .header-title { font-size: 1.05rem; }
      .viewer-modal-overlay { padding: 0px !important; } /* Removes screen padding borders on mobile */
      .viewer-modal-box { height: 100vh !important; max-height: 100vh !important; border-radius: 0px !important; border: none !important; }
      .fullscreen-brand-img { width: 65px; height: 65px; }
      
      /* 🔒 GUARANTEED Z-INDEX LAYER POSITIONING ON TOUCH SCREENS */
      #fullscreenReaderCardBox .fullscreen-floating-exit-node,
      #floatingExitFullscreenBtn { 
        top: 20px !important; 
        right: 20px !important; 
        padding: 10px 16px !important; 
        font-size: 0.85rem !important;
        position: absolute !important;
      }
    }
  </style>
</head>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzUOh21Ec31kKmf42Tcw-xs4fVZyPh2fM",
      authDomain: "paramount-school-d55bc.firebaseapp.com",
      databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com",
      projectId: "paramount-school-d55bc",
      storageBucket: "paramount-school-d55bc.firebasestorage.app",
      messagingSenderId: "130979432562",
      appId: "1:130979432562:web:4cd94787b23f9daba51aeb",
      measurementId: "G-ZMZHXB5GFM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const txtAvatarPlaceholder = document.getElementById('txtAvatarPlaceholder');
    const userProfileImageDisplay = document.getElementById('userProfileImageDisplay');
    const dropdownUserNameText = document.getElementById('dropdownUserNameText');
    const dropdownUserEmailText = document.getElementById('dropdownUserEmailText');
    const profileMenuDropsheet = document.getElementById('profileMenuDropsheet');

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = 'index.html'; } 
      else {
        dropdownUserEmailText.textContent = user.email;
        dropdownUserNameText.textContent = user.displayName || "Paramount Student";
        
        if (user.photoURL) {
          txtAvatarPlaceholder.style.display = "none";
          userProfileImageDisplay.src = user.photoURL;
          userProfileImageDisplay.style.display = "block";
        } else {
          txtAvatarPlaceholder.textContent = user.email.charAt(0).toUpperCase();
          txtAvatarPlaceholder.style.display = "flex";
          userProfileImageDisplay.style.display = "none";
        }
      }
    });

    document.getElementById('userProfileDropdownAnchor').addEventListener('click', (e) => {
      e.stopPropagation();
      profileMenuDropsheet.classList.toggle('active');
    });

    window.addEventListener('click', () => { profileMenuDropsheet.classList.remove('active'); });

    window.addEventListener('keydown', function(e) {
      if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) || (e.ctrlKey && (e.keyCode == 83 || e.keyCode == 80 || e.keyCode == 85))) {
        e.preventDefault(); return false;
      }
    });

    const primarySubjects = ["English", "Telugu", "Hindi", "Mathematics", "EVS", "Computers", "GK", "Drawing"];
    const middleSubjects = ["English", "Telugu", "Hindi", "Mathematics", "Physics", "Chemistry", "Social Studies", "IIT Foundation"];

    const gradeDropdown = document.getElementById('gradeSelection');
    const subjectDropdown = document.getElementById('subjectSelection');
    const shelf = document.getElementById('booksDisplayShelf');

    gradeDropdown.addEventListener('change', function() {
      const selectedGrade = this.value;
      subjectDropdown.innerHTML = '<option value="" disabled selected>Choose Target Subject</option>';
      subjectDropdown.disabled = false;

      let activeSubjects = (selectedGrade.includes("Grade 6") || selectedGrade.includes("Grade 7") || selectedGrade.includes("Grade 8")) ? middleSubjects : primarySubjects;
      activeSubjects.forEach(sub => {
        const opt = document.createElement('option');
        opt.value = sub; opt.textContent = sub;
        subjectDropdown.appendChild(opt);
      });
      shelf.innerHTML = '<div class="no-books-alert">Please select an individual Subject tranche.</div>';
    });

    subjectDropdown.addEventListener('change', async () => {
      const grade = gradeDropdown.value;
      const subject = subjectDropdown.value;
      shelf.innerHTML = '<div class="no-books-alert">Fetching secure cloud index assets...</div>';

      try {
        const bQuery = query(collection(db, "digital_library"), where("grade", "==", grade), where("subject", "==", subject));
        const querySnapshot = await getDocs(bQuery);
        shelf.innerHTML = '';

        if (querySnapshot.empty) {
          shelf.innerHTML = '<div class="no-books-alert">No digital books uploaded for this subject profile yet.</div>'; return;
        }

        querySnapshot.forEach((doc) => {
          const book = doc.data();
          const card = document.createElement('div');
          card.className = 'book-card glass-card';
          card.innerHTML = `<div class="book-cover-placeholder">📘</div><div class="book-title">${book.title}</div><div class="book-info-tag">Author: ${book.author || 'Academic Panel'}</div>`;
          
         card.addEventListener('click', () => {
            let driveId = "";
            if (book.fileURL.includes('id=')) { driveId = book.fileURL.split('id=')[1].split('&')[0]; } 
            else if (book.fileURL.includes('/d/')) { driveId = book.fileURL.split('/d/')[1].split('/')[0]; }
            
            if (driveId) {
              // 📱 HIGH-SPEED MOBILE ACCELERATION WORKER
              const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
              
              if (isMobile) {
                // Instantly routes the file directly into the phone's hardware rendering engine (Loads instantly!)
                window.open(`https://docs.google.com/uc?export=view&id=${driveId}`, '_blank');
              } else {
                // Keeps your premium glassmorphic modal box active on high-end desktops
                document.getElementById('modalBookTitleDisplay').textContent = book.title;
                document.getElementById('inlinePdfStreamer').src = `https://drive.google.com/file/d/${driveId}/preview`;
                document.getElementById('readerOverlayFrame').style.display = 'flex';
              }
            } else {
              alert("Link parsing failed. Please check document parameters.");
            }
          });
          shelf.appendChild(card);
        });
      } catch (err) { shelf.innerHTML = '<div class="no-books-alert">Security Query Interrupted.</div>'; }
    });

    // 🌟 RE-ENGINEERED DEVICE-AGNOSTIC FULLSCREEN ENGINE CONTROLLERS
    const fullscreenTarget = document.getElementById('fullscreenReaderCardBox');
    const toggleFullscreenBtn = document.getElementById('toggleFullscreenBtn');
    const floatingExitFullscreenBtn = document.getElementById('floatingExitFullscreenBtn');
    const toolbarHeader = document.getElementById('readerToolbarHeader');

    // Detect mobile platform type dynamically
    const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    function triggerNormalScreenModeRelease() {
      if (isMobileDevice) {
        // Break out of the mobile fullscreen fallback layout tracking node
        fullscreenTarget.setAttribute('data-mobile-fullscreen', 'false');
      } else {
        if (document.exitFullscreen) { document.exitFullscreen(); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
      }
      toggleFullscreenBtn.textContent = "Go Fullscreen";
      toolbarHeader.style.display = "flex";
    }

    toggleFullscreenBtn.addEventListener('click', () => {
      if (isMobileDevice) {
        // 🔒 MOBILE BYPASS: iPhone/Android viewport override scaling logic matches layout boundaries flawlessly
        fullscreenTarget.setAttribute('data-mobile-fullscreen', 'true');
        toggleFullscreenBtn.textContent = "Exit Fullscreen";
        toolbarHeader.style.display = "none";
        fullscreenTarget.focus();
      } else {
        // Standard high-end hardware screen monitor requests
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          if (fullscreenTarget.requestFullscreen) { fullscreenTarget.requestFullscreen().then(() => { fullscreenTarget.focus(); }); }
          else if (fullscreenTarget.webkitRequestFullscreen) { fullscreenTarget.webkitRequestFullscreen(); setTimeout(() => { fullscreenTarget.focus(); }, 100); }
          toggleFullscreenBtn.textContent = "Exit Fullscreen";
          toolbarHeader.style.display = "none"; 
        } else {
          triggerNormalScreenModeRelease();
        }
      }
    });

    floatingExitFullscreenBtn.addEventListener('click', () => {
      triggerNormalScreenModeRelease();
    });

    function monitorFullscreenExitChange() {
      if (!document.fullscreenElement && !document.webkitFullscreenElement && !isMobileDevice) {
        toggleFullscreenBtn.textContent = "Go Fullscreen";
        toolbarHeader.style.display = "flex";
      }
    }
    document.addEventListener('fullscreenchange', monitorFullscreenExitChange);
    document.addEventListener('webkitfullscreenchange', monitorFullscreenExitChange);

    document.getElementById('closeReaderBtn').addEventListener('click', () => {
      if (document.fullscreenElement || document.webkitFullscreenElement || fullscreenTarget.getAttribute('data-mobile-fullscreen') === 'true') {
        triggerNormalScreenModeRelease();
      }
      document.getElementById('readerOverlayFrame').style.display = 'none';
      document.getElementById('inlinePdfStreamer').src = '';
    });

    document.getElementById('logoutActionBtn').addEventListener('click', () => { signOut(auth).then(() => window.location.href = 'index.html'); });
  </script>
</body>
</html>
