<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Bookshelf Portal | Paramount School</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background-color: #030712; color: white; min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
    
    .background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 10%, rgba(2, 35, 90, 0.4), transparent 60%), linear-gradient(180deg, #030712 0%, #070e1e 100%); z-index: -3; }
    
    .dashboard-layout { max-width: 1200px; margin: 0 auto; padding: 40px 20px; width: 100%; flex-grow: 1; }
    .header-nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 20px; margin-bottom: 40px; gap: 15px; }
    .nav-title { font-size: 1.8rem; font-weight: 700; background: linear-gradient(to right, #ffffff, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logout-btn { padding: 10px 22px; border-radius: 100px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #fca5a5; font-size: 0.9rem; cursor: pointer; transition: 0.3s; font-weight: 500; }
    .logout-btn:hover { background: rgba(239, 68, 68, 0.25); }

    .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; padding: 30px; }
    .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
    .select-group { display: flex; flex-direction: column; gap: 8px; }
    .select-group label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
    .select-group select { padding: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1rem; outline: none; cursor: pointer; }
    .select-group select option { background-color: #081125; color: white; }

    .books-container-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
    .book-card { padding: 25px; text-align: center; border-radius: 16px; transition: 0.3s ease; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
    .book-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.05); border-color: rgba(59, 130, 246, 0.3); }
    .book-cover-placeholder { width: 100px; height: 130px; background: linear-gradient(135deg, #1e3a8a, #3b82f6); border-radius: 8px; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .book-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; color: #ffffff; }
    .book-card:hover .book-title { color: #93c5fd; }
    .book-info-tag { font-size: 0.85rem; color: #94a3b8; }
    .no-books-alert { text-align: center; color: #94a3b8; padding: 40px; grid-column: 1 / -1; font-size: 1.1rem; }

    .viewer-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    .viewer-modal-box { width: 100%; max-width: 950px; height: 90vh; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; }
    .viewer-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .viewer-close { font-size: 1.5rem; color: #94a3b8; cursor: pointer; background: none; border: none; }
    .viewer-iframe { width: 100%; height: 100%; border: none; background: white; }

    .site-footer { width: 100%; padding: 30px 20px; text-align: center; background: rgba(255, 255, 255, 0.01); border-top: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 40px; }
    .footer-logo { width: 45px; height: 45px; object-fit: contain; border-radius: 50%; filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.3)); }
    .footer-text { font-size: 0.9rem; color: #94a3b8; letter-spacing: 0.5px; }
    .footer-text strong { color: #ffffff; font-weight: 600; }

    @media (max-width: 768px) {
      .controls-grid { grid-template-columns: 1fr; gap: 15px; }
      .nav-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="background"></div>

  <div class="dashboard-layout">
    <header class="header-nav">
      <h1 class="nav-title">📚 Paramount Digital Campus Library</h1>
      <button class="logout-btn" id="logoutActionBtn">Sign Out Securely</button>
    </header>

    <main class="controls-grid glass-card">
      <div class="select-group">
        <label for="gradeSelection">Select Academic Grade / Class</label>
        <select id="gradeSelection">
          <option value="" disabled selected>Choose Class Level</option>
          <option value="Pre-KG">Pre-KG</option>
          <option value="LKG">LKG</option>
          <option value="UKG">UKG</option>
          <option value="Grade 1">Grade 1</option>
          <option value="Grade 2">Grade 2</option>
          <option value="Grade 3">Grade 3</option>
          <option value="Grade 4">Grade 4</option>
          <option value="Grade 5">Grade 5</option>
          <option value="Grade 6">Grade 6</option>
          <option value="Grade 7">Grade 7</option>
          <option value="Grade 8">Grade 8</option>
        </select>
      </div>

      <div class="select-group">
        <label for="subjectSelection">Select Subject Core</label>
        <select id="subjectSelection" disabled>
          <option value="" disabled selected>Awaiting Class Specification</option>
        </select>
      </div>
    </main>

    <div class="books-container-grid" id="booksDisplayShelf">
      <div class="no-books-alert">Please select an individual Grade and Subject tracking module above.</div>
    </div>
  </div>

  <div class="viewer-modal-overlay" id="readerOverlayFrame">
    <div class="viewer-modal-box">
      <div class="viewer-toolbar">
        <h3 id="modalBookTitleDisplay" style="font-size: 1.1rem; color: white;">Document Stream</h3>
        <button class="viewer-close" id="closeReaderBtn">&times;</button>
      </div>
      <iframe class="viewer-iframe" id="inlinePdfStreamer" src=""></iframe>
    </div>
  </div>

  <footer class="site-footer">
    <img src="logo.png" alt="Paramount Institutional Emblem" class="footer-logo">
    <div class="footer-text">
      2026 &copy; <strong>PARAMOUNT ENGLISH MEDIUM HIGH SCHOOL</strong> | All Rights Reserved.
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8",
      authDomain: "paramount-school-d55bc.firebaseapp.com",
      databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com",
      projectId: "paramount-school-d55bc",
      storageBucket: "paramount-school-d55bc.firebasestorage.app",
      messagingSenderId: "130979432562",
      appId: "1:130979432562:web:4cd94787b23f9daba51aeb",
      measurementId: "G-ZMZHXB5GFM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // FIXED: Updated redirect route from library-auth.html to index.html for correct domain landing
    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = 'index.html'; }
    });

    const primarySubjects = ["English", "Telugu", "Hindi", "Mathematics", "EVS", "Computers", "GK", "Drawing"];
    const middleSubjects = ["English", "Telugu", "Hindi", "Mathematics", "Physics", "Chemistry", "Social Studies", "IIT Foundation"];

    const gradeDropdown = document.getElementById('gradeSelection');
    const subjectDropdown = document.getElementById('subjectSelection');
    const shelf = document.getElementById('booksDisplayShelf');

    gradeDropdown.addEventListener('change', function() {
      const selectedGrade = this.value;
      subjectDropdown.innerHTML = '<option value="" disabled selected>Choose Target Subject</option>';
      subjectDropdown.disabled = false;

      let activeSubjects = (selectedGrade.includes("Grade 6") || selectedGrade.includes("Grade 7") || selectedGrade.includes("Grade 8")) 
                           ? middleSubjects : primarySubjects;

      activeSubjects.forEach(sub => {
        const opt = document.createElement('option');
        opt.value = sub; opt.textContent = sub;
        subjectDropdown.appendChild(opt);
      });
      shelf.innerHTML = '<div class="no-books-alert">Please select an individual Subject tranche.</div>';
    });

    subjectDropdown.addEventListener('change', async () => {
      const grade = gradeDropdown.value;
      const subject = subjectDropdown.value;
      shelf.innerHTML = '<div class="no-books-alert">Fetching secure cloud index assets...</div>';

      try {
        const bQuery = query(collection(db, "digital_library"), where("grade", "==", grade), where("subject", "==", subject));
        const querySnapshot = await getDocs(bQuery);
        shelf.innerHTML = '';

        if (querySnapshot.empty) {
          shelf.innerHTML = '<div class="no-books-alert">No digital books uploaded for this subject profile yet.</div>';
          return;
        }

        querySnapshot.forEach((doc) => {
          const book = doc.data();
          const card = document.createElement('div');
          card.className = 'book-card glass-card';
          card.innerHTML = `
            <div class="book-cover-placeholder">📘</div>
            <div class="book-title">${book.title}</div>
            <div class="book-info-tag">Author: ${book.author || 'Academic Panel'}</div>
          `;
          card.addEventListener('click', () => {
            document.getElementById('modalBookTitleDisplay').textContent = book.title;
            document.getElementById('inlinePdfStreamer').src = `https://docs.google.com/gview?url=${encodeURIComponent(book.fileURL)}&embedded=true`;
            document.getElementById('readerOverlayFrame').style.display = 'flex';
          });
          shelf.appendChild(card);
        });
      } catch (err) {
        shelf.innerHTML = '<div class="no-books-alert">Security Query Interrupted.</div>';
      }
    });

    document.getElementById('closeReaderBtn').addEventListener('click', () => {
      document.getElementById('readerOverlayFrame').style.display = 'none';
      document.getElementById('inlinePdfStreamer').src = '';
    });

    // FIXED: Updated route from library-auth.html to index.html for smooth sign-out experience
    document.getElementById('logoutActionBtn').addEventListener('click', () => {
      signOut(auth).then(() => window.location.href = 'index.html');
    });
  </script>
</body>
</html>
