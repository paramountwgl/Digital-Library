<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Library Password | Paramount School</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    html, body { overflow-x: hidden; background-color: #030712; color: white; min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; position: relative; scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none !important; }
    
    .background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 40%, rgba(2, 35, 90, 0.6), transparent 60%), radial-gradient(circle at 15% 20%, rgba(30, 64, 175, 0.25), transparent 45%), radial-gradient(circle at 85% 70%, rgba(109, 40, 217, 0.2), transparent 50%), linear-gradient(180deg, #030712 0%, #081125 50%, #020617 100%); z-index: -3; }
    .starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
    .star { position: absolute; top: 50%; left: 50%; background: #ffffff; border-radius: 50%; opacity: 0; animation: flyOutwards var(--duration) linear infinite; animation-delay: var(--delay); }
    @keyframes flyOutwards {
      0% { transform: translate(-50%, -50%) translate3d(var(--tx), var(--ty), 0) scale(0.1); opacity: 0; }
      10% { opacity: var(--max-opacity); }
      90% { opacity: var(--max-opacity); }
      100% { transform: translate(-50%, -50%) translate3d(calc(var(--tx) * 8), calc(var(--ty) * 8), 0) scale(var(--max-scale)); box-shadow: 0 0 8px rgba(255, 255, 255, 0.5); opacity: 0; }
    }

    .premium-header { width: 100%; padding: 20px 40px; display: flex; align-items: center; gap: 20px; background: rgba(255, 255, 255, 0.01); border-bottom: 1px solid rgba(255, 255, 255, 0.06); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 10; }
    .header-logo { width: 55px; height: 55px; object-fit: contain; border-radius: 50%; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.4)); border: 1px solid rgba(255, 255, 255, 0.1); }
    .header-text-container { display: flex; flex-direction: column; }
    .header-title { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.5px; color: #ffffff; text-transform: uppercase; }
    .header-subtitle { font-size: 0.85rem; font-weight: 500; color: #60a5fa; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    .portal-wrapper { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; z-index: 5; position: relative; }
    .auth-panel { width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 28px; padding: 35px 30px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); text-align: center; }
    .panel-branding-logo-wrapper { width: 105px; height: 105px; background: rgba(3, 7, 18, 0.4); border: 2px solid rgba(59, 130, 246, 0.35); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; padding: 6px; box-shadow: 0 0 25px rgba(59, 130, 246, 0.35), 0 0 50px rgba(139, 92, 246, 0.15); }
    .panel-logo-img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }

    .portal-title { font-size: 1.5rem; font-weight: 700; background: linear-gradient(to right, #ffffff, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
    .portal-subtitle { font-size: 0.85rem; color: #94a3b8; margin-bottom: 25px; line-height: 1.5; }
    
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #cbd5e1; margin-bottom: 6px; font-weight: 500; }
    
    .input-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
    .input-wrapper input { width: 100%; padding: 12px 45px 12px 16px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 12px; color: white; font-size: 0.9rem; outline: none; transition: all 0.3s ease; }
    .input-wrapper input:focus { border-color: #3b82f6; background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 15px rgba(59, 130, 246, 0.25); }

    .password-toggle-eye { position: absolute; right: 16px; color: #94a3b8; cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; }
    
    .action-btn { width: 100%; padding: 14px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border: none; border-radius: 12px; color: white; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 5px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5); }
    
    .error-box { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.25); color: #fca5a5; padding: 12px; border-radius: 12px; font-size: 0.8rem; margin-bottom: 16px; display: none; text-align: left; line-height: 1.4; }
    .success-box { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.25); color: #a7f3d0; padding: 12px; border-radius: 12px; font-size: 0.8rem; margin-bottom: 16px; display: none; text-align: left; }

    .site-footer { width: 100%; padding: 25px 20px; text-align: center; background: rgba(255, 255, 255, 0.01); border-top: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 10; font-size: 0.8rem; color: #4b5563; }
  </style>
</head>
<body>

  <header class="premium-header">
    <img src="logo.png" alt="Paramount Logo" class="header-logo" onerror="this.style.display='none'">
    <div class="header-text-container">
      <h1 class="header-title">Paramount English Medium High School</h1>
      <div class="header-subtitle">Digital Library</div>
    </div>
  </header>

  <div class="background"></div>
  <div class="starfield" id="starfield"></div>

  <div class="portal-wrapper">
    <div class="auth-panel" id="resetCoreFormContainer">
      <div class="panel-branding-logo-wrapper">
        <img src="logo.png" alt="Paramount Emblem" class="panel-logo-img">
      </div>

      <h2 class="portal-title">Reset Your Password</h2>
      <p class="portal-subtitle" id="resetStatusDescription">Enter a brand new manual security access combination password for your locker profile below.</p>

      <div class="error-box" id="errorMessageBox"></div>
      <div class="success-box" id="successMessageBox"></div>

      <form id="saveNewPasswordForm" style="display: none;">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="input-wrapper">
            <input type="password" id="newPassword" placeholder="Minimum 6 characters" required />
            <span class="password-toggle-eye" id="toggleEye1">👁️</span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmNewPassword">Confirm New Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirmNewPassword" placeholder="Re-type password" required />
            <span class="password-toggle-eye" id="toggleEye2">👁️</span>
          </div>
        </div>

        <button type="submit" class="action-btn">Update Security Password</button>
      </form>
    </div>
  </div>

  <footer class="site-footer">
    2026 &copy; <strong>PARAMOUNT ENGLISH MEDIUM HIGH SCHOOL</strong> | All Rights Reserved.
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzUOh21Ec31kKmf42Tcw-xs4fVZyPh2fM", 
      authDomain: "paramount-school-d55bc.firebaseapp.com",
      databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com",
      projectId: "paramount-school-d55bc",
      storageBucket: "paramount-school-d55bc.firebasestorage.app",
      messagingSenderId: "130979432562",
      appId: "1:130979432562:web:4cd94787b23f9daba51aeb",
      measurementId: "G-ZMZHXB5GFM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const errorBox = document.getElementById('errorMessageBox');
    const successBox = document.getElementById('successMessageBox');
    const resetForm = document.getElementById('saveNewPasswordForm');
    const statusDesc = document.getElementById('resetStatusDescription');

    // Automatically parse the token key variables sent by the free Firebase email system
    const urlParams = new URLSearchParams(window.location.search);
    const oobCode = urlParams.get('oobCode');

    if (!oobCode) {
      errorBox.style.display = 'block';
      errorBox.textContent = "❌ Authorization Link Invalid: This recovery pass key is missing its token data. Please request a new link from the home screen.";
    } else {
      // Validate the token block against Firebase cloud securely in the background
      verifyPasswordResetCode(auth, oobCode)
        .then((email) => {
          statusDesc.innerHTML = `Setting up custom manual password parameters for registered account: <strong style="color: #60a5fa;">${email}</strong>`;
          resetForm.style.display = "block";
        })
        .catch((err) => {
          errorBox.style.display = 'block';
          errorBox.textContent = "❌ Token Expired: This request parameter has expired or has already been used. Please issue a fresh token reset request.";
        });
    }

    // Interactive Visibility Eye Toggles
    function binderToggle(eyeId, inputId) {
      document.getElementById(eyeId).addEventListener('click', function() {
        const input = document.getElementById(inputId);
        if (input.type === "password") { input.type = "text"; this.textContent = "🙈"; }
        else { input.type = "password"; this.textContent = "👁️"; }
      });
    }
    binderToggle('toggleEye1', 'newPassword');
    binderToggle('toggleEye2', 'confirmNewPassword');

    // Handle Form Processing
    document.getElementById('saveNewPasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      errorBox.style.display = 'none';
      successBox.style.display = 'none';

      const pass = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmNewPassword').value;

      if (pass !== confirmPass) {
        errorBox.style.display = 'block';
        errorBox.textContent = "❌ Validation Error: Input passwords do not match.";
        return;
      }

      if (pass.length < 6) {
        errorBox.style.display = 'block';
        errorBox.textContent = "❌ Security Limit: Your password must be at least 6 characters long.";
        return;
      }

      // Write the new manual password directly into Firebase Core
      confirmPasswordReset(auth, oobCode, pass)
        .then(() => {
          resetForm.style.display = "none";
          successBox.style.display = 'block';
          successBox.textContent = "🎉 Security Password Synchronized! Redirecting to login gateway in 3 seconds...";
          setTimeout(() => {
            window.location.href = './index.html';
          }, 3000);
        })
        .catch((err) => {
          errorBox.style.display = 'block';
          errorBox.textContent = `❌ Database Rejection: ${err.message.replace("Firebase: ", "")}`;
        });
    });

    // Space Particles Background
    const starfield = document.getElementById('starfield');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const starSize = Math.random() * 2 + 1;
      star.style.width = starSize + 'px';
      star.style.height = starSize + 'px';
      const angle = Math.random() * Math.PI * 2;
      const distance = 40 + Math.random() * 180;
      star.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
      star.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
      star.style.setProperty('--duration', (2.5 + Math.random() * 4) + 's');
      star.style.setProperty('--delay', (Math.random() * 5) + 's');
      star.style.setProperty('--max-opacity', 0.3 + Math.random() * 0.6);
      star.style.setProperty('--max-scale', 2 + Math.random() * 3);
      starfield.appendChild(star);
    }
  </script>
</body>
</html>
